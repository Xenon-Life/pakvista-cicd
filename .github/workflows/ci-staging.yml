```yaml
name: CI - Staging

on:
  pull_request:
    branches:
      - staging

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/pakvista

jobs:
  ci-staging:
    name: ci-staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint HTML
        run: npm run lint:html

      - name: Lint CSS
        run: npm run lint:css

      - name: Build project
        run: npm run build

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:staging-latest
            ${{ env.IMAGE_NAME }}:staging-${{ github.sha }}

      - name: Confirm staging image publication
        run: |
          echo "Staging Docker image published successfully"
          echo "Latest tag: staging-latest"
          echo "SHA tag: staging-${{ github.sha }}"
```
